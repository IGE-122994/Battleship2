menu.help.title======================== MENU HELP =========================
menu.help.intro=Type one of the commands below to interact with the game:
menu.help.gerafrota=- gerafrota: Generates a random fleet of ships.
menu.help.lefrota=- lefrota: Lets you create and load a custom fleet.
menu.help.estado=- estado: Shows the current fleet status.
menu.help.mapa=- mapa: Displays the fleet map.
menu.help.rajada=- rajada: Fires a burst of shots.
menu.help.simula=- simula: Simulates a full game.
menu.help.tiros=- tiros: Lists valid shots made (* = shot on ship, o = shot on water)
menu.help.desisto=- desisto: Exits the game.
