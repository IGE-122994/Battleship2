# Número de aluno: 110323 - Francisco Silva
# Cheiro no código: Long Method (Martin Fowler)
# Classe: HuggingFaceClient - método buildGameHistory()
# Detetado via: Overly complex method + Overly long method (Method metrics)
# Métricas: CC=30 (threshold > 5), LOC=85 (threshold > 31)

name: Qodana - Long Method Detection

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Qodana
        uses: JetBrains/qodana-action@v2024.1
        with:
          args: --fail-threshold,0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Upload Qodana report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qodana-report
          path: ${{ runner.temp }}/qodana/results
